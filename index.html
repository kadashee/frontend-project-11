<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS Агрегатор</title>
  <script type="module" src="/src/main.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<main class="flex-grow-1">
  <section class="container-fluid bg-dark p-5">
    <div class="row">
      <div class="col-lg-8 mx-auto text-white">

        <h1 class="display-3">RSS агрегатор</h1>
        <p class="lead">Начните читать RSS сегодня! Это легко, это красиво.</p>

        <form class="mt-4" id="rss-form" novalidate>
          <div class="row">
            <div class="col">
              <div class="form-floating">
                <input
                  id="url-input"
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="Ссылка RSS"
                  name="url"
                  autocomplete="off"
                  autofocus
                >
                <label for="url-input">Ссылка RSS</label>
              </div>
              <p class="example mt-2 mb-0 text-secondary">Пример: https://lorem-rss.hexlet.app/feed</p>
              <p class="feedback mt-2 mb-0 small"></p>
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-lg btn-primary px-sm-5" aria-label="add">
                Добавить
              </button>
            </div>
          </div>
        </form>

      </div>
    </div>
  </section>

  <section class="container-xxl mt-5">
    <div class="row">
      <div class="col-md-10 col-lg-8 mx-auto">
        <div class="row gy-4">
          <div class="col-12 col-lg-8" id="posts"></div>
          <div class="col-12 col-lg-4" id="feeds"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="footer border-top py-3 mt-auto bg-light">
  <div class="container-xxl text-center">
    created by
    <a href="https://github.com/kadashee">kadashee</a>
  </div>
</footer>

<div class="modal fade" id="postModal" tabindex="-1" aria-labelledby="postModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title fs-5" id="postModalLabel"></h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer">
        <a class="btn btn-primary full-article" href="#" target="_blank" rel="noopener noreferrer">Читать полностью</a>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
